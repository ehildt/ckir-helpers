integrity: 8f2331307bf9ea268966b871bb029daf9a44930ef332224877b854bba6f2244c
# yaml-language-server: $schema=https://raw.githubusercontent.com/ehildt/depbadge/refs/heads/main/depbadgerc.schema.json

target: README.md

manifest: package.json

output:
  - markdown

dependenciesLayout: &DEPENDENCIES_LAYOUT
  position: center
  showHeader: false

dependenciesStyle: &DEPENDENCIES_STYLE
  labelColor: "333"
  isError: false
  namedLogo: npm
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600

statusBadgesStyle: &STATUS_BADGES_STYLE
  labelColor: "333"
  isError: false
  namedLogo: npm
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600

peerDependencies:
  layout: 
    <<: *DEPENDENCIES_LAYOUT
    header: PeerDependencies
    showHeader: true
    position: center
  badgeStyle: 
    <<: *DEPENDENCIES_STYLE
    style: flat
  items:
    - name: "@nestjs/common"
      namedLogo: npm
      link: https://github.com/nestjs/nest
    - name: "@nestjs/swagger"
      namedLogo: npm
      link: https://github.com/nestjs/swagger
    - name: joi
      namedLogo: npm
      link: https://github.com/sideway/joi

dependencies:
  items: []

devDependencies:
  layout: 
    <<: *DEPENDENCIES_LAYOUT
    header: DevDependencies
    showHeader: true
    position: center
  badgeStyle:
    <<: *DEPENDENCIES_STYLE
    style: flat-square
  items:
    - name: "@changesets/cli"
      namedLogo: npm
    - name: "@eslint/js"
      namedLogo: eslint
    - name: "@types/eslint"
      namedLogo: eslint
    - name: "@types/node"
      namedLogo: node
    - name: depcheck
      namedLogo: npm
    - name: dependency-cruiser
      namedLogo: npm
    - name: dotenv-cli
      namedLogo: npm
    - name: eslint
      namedLogo: eslint
    - name: eslint-config-prettier
      namedLogo: prettier
    - name: eslint-plugin-prettier
      namedLogo: prettier
    - name: eslint-plugin-simple-import-sort
      namedLogo: npm
    - name: eslint-plugin-sonarjs
      namedLogo: sonar
    - name: globals
      namedLogo: npm
    - name: husky
      namedLogo: husky
    - name: "vitest"
      namedLogo: vitest
    - name: "@vitest/coverage-v8"
      namedLogo: vitest
    - name: jiti
      namedLogo: npm
    - name: lint-staged
      namedLogo: npm
    - name: npm-check-updates
      namedLogo: npm
    - name: rimraf
      namedLogo: npm
    - name: source-map-support
      namedLogo: npm
    - name: ts-loader
      namedLogo: npm
    - name: ts-node
      namedLogo: npm
    - name: ts-unused-exports
      namedLogo: npm
    - name: typescript
      namedLogo: typescript
    - name: typescript-eslint
      namedLogo: eslint

statusBadges:
  layout:
    position: center
    showHeader: true
    header: StatusBadges
  badgeStyle: *STATUS_BADGES_STYLE
  items:
    - name: github
      metric: release
      user: ehildt
      repo: ckir-helpers
      branch: main
      namedLogo: github
    - name: github
      metric: stars
      user: ehildt
      repo: ckir-helpers
      branch: main
      namedLogo: github
    - name: github
      metric: license
      user: ehildt
      repo: ckir-helpers
      branch: main
      namedLogo: github
    - name: codecov
      user: ehildt
      repo: ckir-helpers
      branch: main
      namedLogo: codecov