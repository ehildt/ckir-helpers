integrity: 1c0881f6b73b3ccbef6ce37201f37fafc4a3915a154a63138df3c4daa7e5d658
# yaml-language-server: $schema=https://raw.githubusercontent.com/ehildt/depbadge/refs/heads/main/depbadgerc.schema.json

target: README.md

manifest: package.json

output:
  - markdown

dependenciesLayout: &DEPENDENCIES_LAYOUT
  position: center
  showHeader: false

dependenciesStyle: &DEPENDENCIES_STYLE
  labelColor: "333"
  isError: false
  namedLogo: npm
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600

statusBadgesStyle: &STATUS_BADGES_STYLE
  labelColor: "333"
  isError: false
  namedLogo: npm
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600

peerDependencies:
  layout: *DEPENDENCIES_LAYOUT
  badgeStyle: *DEPENDENCIES_STYLE
  items:
    - name: "@nestjs/common"
      namedLogo: npm
      link: https://github.com/nestjs/nest
    - name: "@nestjs/swagger"
      namedLogo: npm
      link: https://github.com/nestjs/swagger
    - name: joi
      namedLogo: npm
      link: https://github.com/sideway/joi

dependencies:
  items: []

devDependencies:
  layout: *DEPENDENCIES_LAYOUT
  badgeStyle:
    <<: *DEPENDENCIES_STYLE
    style: flat-square
  items:
    - name: "@changesets/cli"
      namedLogo: npm
    - name: "@eslint/js"
      namedLogo: eslint
    - name: "@types/eslint"
      namedLogo: eslint
    - name: "@types/node"
      namedLogo: node
    - name: depcheck
      namedLogo: npm
    - name: dependency-cruiser
      namedLogo: npm
    - name: dotenv-cli
      namedLogo: npm
    - name: eslint
      namedLogo: eslint
    - name: eslint-config-prettier
      namedLogo: prettier
    - name: eslint-plugin-prettier
      namedLogo: prettier
    - name: eslint-plugin-simple-import-sort
      namedLogo: npm
    - name: eslint-plugin-sonarjs
      namedLogo: sonar
    - name: globals
      namedLogo: npm
    - name: husky
      namedLogo: husky
    - name: "vitest"
      namedLogo: vitest
    - name: "@vitest/coverage-v8"
      namedLogo: vitest
    - name: jiti
      namedLogo: npm
    - name: lint-staged
      namedLogo: npm
    - name: npm-check-updates
      namedLogo: npm
    - name: rimraf
      namedLogo: npm
    - name: source-map-support
      namedLogo: npm
    - name: ts-loader
      namedLogo: npm
    - name: ts-node
      namedLogo: npm
    - name: ts-unused-exports
      namedLogo: npm
    - name: typescript
      namedLogo: typescript
    - name: typescript-eslint
      namedLogo: eslint

statusBadges:
  layout:
    position: center
    showHeader: false
  badgeStyle: *STATUS_BADGES_STYLE
  items:
    - name: github
      metric: release
      user: ehildt
      repo: ckir-helpers
      branch: main
      namedLogo: github
    - name: github
      metric: stars
      user: ehildt
      repo: ckir-helpers
      branch: main
      namedLogo: github
    - name: github
      metric: license
      user: ehildt
      repo: ckir-helpers
      branch: main
      namedLogo: github
    - name: tile
      message: NestJS
      label: Framework
      color: "e0234e"
      link: https://github.com/nestjs/nest
    - name: tile
      message: Swagger
      label: OpenAPI
      color: "e0234e"
      link: https://github.com/nestjs/swagger
    - name: tile
      message: Joi
      label: Validation
      color: "048d04"
      link: https://github.com/sideway/joi
